<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Wander Ease 會員中心</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    :root{--brand-bg:#efe8df;--brand-charcoal:#2c2c2f;--brand-brown:#795238;--brand-brown-hover:#5e3f2b;--brand-white:#fff;--track-bg:#e0d8d0;--track-active:#795238;--track-final:#2c2c2f;--track-muted:#b8b0a8;}
    body{background:var(--brand-bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--brand-charcoal);padding-bottom:90px;}
    .header-img{width:100%;height:160px;background:var(--brand-charcoal);color:var(--brand-white);display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:0 0 20px 20px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .header-img-mini{height:100px;}
    .card-custom{border:none;border-radius:16px;box-shadow:0 8px 24px rgba(44,44,47,.06);background:var(--brand-white);padding:24px;position:relative;}
    .overlap-top{margin-top:-30px;}
    .btn-brand{background:var(--brand-brown);color:var(--brand-white);border-radius:12px;padding:14px;font-weight:600;font-size:16px;border:none;width:100%;transition:.2s;}
    .btn-brand:hover,.btn-brand:active{background:var(--brand-brown-hover);color:var(--brand-white);}
    .btn-outline-brand{border:1.5px solid var(--brand-brown);color:var(--brand-brown);border-radius:12px;padding:12px;font-weight:600;width:100%;background:transparent;transition:.2s;}
    .btn-outline-brand:hover{background:var(--brand-brown);color:var(--brand-white);}
    .form-label{font-size:13px;font-weight:600;color:#555;margin-bottom:6px;}
    .form-control{border-radius:10px;padding:14px 16px;border:1.5px solid #e0d8d0;background:#fbfaf9;font-size:15px;width:100%;}
    .form-control:focus{border-color:var(--brand-brown);box-shadow:0 0 0 3px rgba(121,82,56,.15);background:var(--brand-white);}
    .loader-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;text-align:center;}
    .spinner-border{color:var(--brand-brown);}
    .text-carousel{font-size:14px;font-weight:bold;color:var(--brand-charcoal);margin-top:15px;min-height:20px;}
    @media(min-width:768px){#adminArea,.page-content{max-width:600px;margin:0 auto;}}

    /* 底部導航 */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--brand-white);border-top:1px solid #e0d8d0;display:flex;justify-content:space-around;align-items:center;padding:10px 0 calc(env(safe-area-inset-bottom,10px) + 4px);box-shadow:0 -4px 16px rgba(0,0,0,.06);}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;}
    .bottom-nav-item .nav-icon{font-size:24px;line-height:1;margin-bottom:4px;}
    .bottom-nav-item .nav-text{font-size:11px;font-weight:700;color:#b8b0a8;}
    .bottom-nav-item.active .nav-text{color:var(--brand-brown);}
    .bottom-nav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--brand-brown);}
    .bottom-nav-item:not(.active) .nav-icon{filter:grayscale(60%) opacity(.5);}
    .page-content{display:none;}.page-content.active{display:block;}
    .btn-contact-line{display:block;width:100%;background:#fff;border:1.5px solid #e8d5c4;color:#7a6c5d;border-radius:12px;padding:12px;font-weight:800;font-size:14px;text-align:center;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,.02);text-decoration:none;}
    .btn-contact-line:hover{background:#faf5f0;color:#4A3C49;text-decoration:none;}

    /* 正式訂單卡片 */
    .card-order{background:var(--brand-white);border-radius:16px;border:1px solid #e0d8d0;margin-bottom:20px;box-shadow:0 4px 16px rgba(44,44,47,.03);overflow:hidden;text-align:left;}
    .order-header{background:#fbfaf9;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:15px;}
    .order-header:hover{background:#f6f0ea;}
    .order-title-container{display:block;flex:1;min-width:0;}
    .order-title-brand{display:block;font-weight:900;color:var(--brand-charcoal);font-size:1.15rem;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .order-title-series{display:block;font-weight:600;color:#666;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .badge-status{background:#fdf3f2;color:#a95a52;border:1px solid #fdf3f2;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:bold;letter-spacing:1px;flex-shrink:0;}
    .status-done{background:#eef5ee;color:#436b46;border-color:#eef5ee;}
    .order-content{display:none;border-top:1px dashed #e0d8d0;padding-top:15px;animation:fadeIn .3s;}
    .order-content.show{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    .notice-box{background:#FFF3CD;border-left:4px solid #856404;padding:15px;margin:0 20px 20px;border-radius:6px;font-size:14px;color:#856404;font-weight:bold;line-height:1.6;text-align:left;}
    .progress-toggle-btn{background:#fbfaf9;border:1px dashed #e0d8d0;color:var(--brand-charcoal);padding:12px;text-align:center;font-weight:700;font-size:14px;border-radius:8px;margin:0 20px 20px;cursor:pointer;}
    .progress-content{display:none;animation:fadeIn .3s;}.progress-content.show{display:block;}
    .progress-wrapper{margin:0 20px 20px;padding:20px 15px;border:1px solid #e0d8d0;border-radius:12px;background:var(--brand-white);}
    .progress-title{font-size:14px;font-weight:800;color:var(--brand-charcoal);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
    .tracker-container{position:relative;display:flex;justify-content:space-between;align-items:flex-start;padding:0 10px;margin-top:15px;}
    .tracker-line{position:absolute;top:15px;left:30px;right:30px;height:3px;background:var(--track-bg);z-index:0;}
    .tracker-step{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;flex:1;}
    .step-dot{width:32px;height:32px;border-radius:50%;background:var(--brand-white);border:3px solid var(--track-muted);display:flex;justify-content:center;align-items:center;box-shadow:0 0 0 4px var(--brand-white);margin-bottom:8px;}
    .step-dot.active{background:var(--track-active);border-color:var(--track-active);}
    .step-dot.final{border-color:var(--track-final);}.step-dot.final.active{background:var(--track-final);}
    .step-label{font-size:12px;font-weight:bold;color:var(--track-active);text-align:center;margin-bottom:4px;white-space:nowrap;}.step-label.muted{color:var(--track-muted);}.step-label.final{color:var(--track-final);}
    .step-pct{font-size:16px;font-weight:900;color:var(--brand-charcoal);}.step-pct.muted{color:var(--track-muted);}
    .details-box{background:#fbfaf9;border:1px solid #e0d8d0;border-radius:12px;margin:0 20px 20px;padding:15px 20px;}
    .item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed #e0d8d0;font-size:14.5px;color:var(--brand-charcoal);}
    .item-name{font-weight:700;line-height:1.4;}.item-qty{color:#888;margin-left:8px;font-size:12px;font-weight:600;}
    .summary-divider{height:1px;border-top:1px dashed #e0d8d0;margin:15px 0;}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;color:#666;font-weight:500;}
    .last5-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;font-size:14px;color:#666;font-weight:600;}
    .last5-value{color:var(--brand-charcoal);font-weight:700;display:flex;align-items:center;gap:8px;}
    .edit-btn{cursor:pointer;color:var(--brand-brown);font-size:13px;font-weight:700;padding:4px 8px;background:#f6f0ea;border-radius:4px;border:1px solid #e0d8d0;z-index:10;position:relative;}
    .edit-btn:hover{background:var(--brand-brown);color:var(--brand-white);border-color:var(--brand-brown);}
    .total-row{display:flex;justify-content:space-between;padding-top:15px;border-top:2px solid #e0d8d0;font-size:1.15rem;font-weight:900;color:var(--brand-charcoal);}
    .total-price{color:#dc3545;}
    .bank-info{background:#fbfaf9;border:1px solid #e0d8d0;padding:20px;margin:0 20px 20px;border-radius:12px;text-align:left;}
    .bank-title{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;}
    .bank-title-text{font-size:14px;color:var(--brand-charcoal);font-weight:900;display:flex;align-items:center;}
    .bank-deadline{font-size:13px;font-weight:800;color:#dc3545;}
    .bank-text{font-family:monospace;font-size:15px;font-weight:bold;color:var(--brand-charcoal);white-space:pre-wrap;line-height:1.6;}
    .bank-warning{font-size:13px;font-weight:bold;color:#a95a52;margin-top:12px;}
    .done-note{margin-top:10px;font-size:13.5px;font-weight:700;color:var(--brand-brown);background:#f6f0ea;padding:8px 12px;border-radius:8px;display:inline-block;}

    /* 預購卡片 */
    .po-card{background:#fff;border-radius:16px;margin-bottom:20px;overflow:hidden;text-align:left;box-shadow:0 4px 16px rgba(44,44,47,.03);}
    .po-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
    .po-title{font-size:15px;font-weight:900;color:var(--brand-charcoal);}
    .po-sub{font-size:12px;margin-top:3px;}
    .po-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;line-height:1.3;text-align:center;}
    .po-body{padding:10px 18px;border-top:1px dashed #e0d8d0;}
    .po-irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px dashed #e0d8d0;gap:6px;font-size:13px;}
    .po-irow:last-child{border-bottom:none;}
    .po-iname{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .po-iprice{color:#888;font-size:12px;white-space:nowrap;flex-shrink:0;}
    .po-sum{border-top:1.5px solid #e0d8d0;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:14px;font-weight:900;}
    .po-sum span:last-child{color:#dc3545;}
    .po-notice{margin:8px 0;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;}
    .po-notes{padding:8px 0;border-top:.5px dashed #e0d8d0;margin-top:8px;font-size:11px;color:#888;}
    .po-notes div{padding:2px 0;line-height:1.5;}
    .qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid #e0d8d0;background:#fbfaf9;font-size:14px;font-weight:700;color:var(--brand-brown);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .qty-btn:active{background:var(--brand-brown);color:#fff;}
    .qty-val{font-size:14px;font-weight:700;min-width:20px;text-align:center;}
    .po-del-btn{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;background:#fdf3f2;color:#791f1f;border:none;cursor:pointer;white-space:nowrap;}
    .po-add-btn{background:#fbfaf9;border:1.5px dashed var(--brand-brown);border-radius:10px;padding:10px;text-align:center;font-size:13px;font-weight:700;color:var(--brand-brown);margin-top:8px;cursor:pointer;}
    .po-submit-btn{background:var(--brand-brown);color:#fff;text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:700;margin-top:10px;cursor:pointer;border:none;width:100%;}
    .po-submit-btn:disabled{background:#b8b0a8;cursor:not-allowed;}
    .po-preview{border-top:2px dashed #e0d8d0;margin-top:10px;padding-top:10px;}
    .po-preview-title{font-size:12px;font-weight:700;color:#555;margin-bottom:6px;}
    .po-pv-item{border-radius:8px;padding:6px 10px;margin-bottom:5px;font-size:12px;display:flex;justify-content:space-between;align-items:center;}
    .po-pv-undo{font-size:11px;font-weight:700;cursor:pointer;}
    .po-shortage-row{border-radius:8px;padding:8px;margin:3px 0;border:none!important;}

    /* 候補 */
    .wl-card{background:#fff;border-radius:16px;border:1px solid #e0d8d0;margin-bottom:16px;overflow:hidden;text-align:left;}
    .wl-card-h{background:#fbfaf9;padding:12px 16px;font-size:14px;font-weight:900;color:var(--brand-charcoal);border-bottom:.5px dashed #e0d8d0;}
    .wl-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:.5px dashed #e0d8d0;font-size:13px;}
    .wl-item:last-child{border-bottom:none;}
    .wl-cancel-btn{background:#fdf3f2;color:#a95a52;font-size:11px;padding:4px 12px;border-radius:6px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;}

    /* 候補頁面新版 V2 */
    .wl-rules-box{background:linear-gradient(135deg,#fff9f0 0%,#fff4e5 100%);border:1px solid #f0d9b5;border-radius:12px;padding:16px;margin-bottom:20px;}
    .wl-rules-box h3{font-size:14px;font-weight:900;color:#8b6f3d;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .wl-rules-box ul{list-style:none;padding:0;font-size:13px;line-height:1.7;color:#5c4423;margin:0;}
    .wl-rules-box li{padding-left:22px;position:relative;margin-bottom:10px;}
    .wl-rules-box li:last-child{margin-bottom:0;}
    .wl-rules-box li::before{content:"💡";position:absolute;left:0;font-size:12px;top:2px;}
    .wl-rules-box strong{color:#6b3d1a;font-weight:700;}
    .wl-section-head{font-size:14px;font-weight:900;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
    .wl-section-head .wl-count{background:#e0d8d0;color:#555;padding:1px 10px;border-radius:10px;font-size:12px;font-weight:700;}
    .wl-section-alert{color:#dc3545;}
    .wl-section-alert .wl-count{background:#dc3545;color:white;}
    .wl-confirm-wrapper{border:2px solid #dc3545;border-radius:12px;padding:4px;background:linear-gradient(135deg,#fff5f5 0%,#ffe8e8 100%);margin-bottom:16px;box-shadow:0 4px 14px rgba(220,53,69,0.12);}
    .wl-confirm-alert{background:#dc3545;color:white;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;}
    .wl-v2-card{border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid #e0d8d0;}
    .wl-v2-cardhead{padding:10px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px dashed rgba(0,0,0,0.12);}
    .wl-v2-brand{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:white;}
    .wl-v2-series{font-size:13px;font-weight:900;color:#2c2c2f;}
    .wl-v2-body{padding:4px 0;background:white;}
    .wl-v2-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px dashed #eee;gap:8px;}
    .wl-v2-item:last-child{border-bottom:none;}
    .wl-v2-info{flex:1;min-width:0;}
    .wl-v2-name{font-size:14px;font-weight:700;color:#2c2c2f;word-break:break-all;line-height:1.4;}
    .wl-v2-meta{font-size:11px;color:#888;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
    .wl-v2-actions{flex-shrink:0;display:flex;gap:6px;}
    .wl-btn-cancel{background:#fdf3f2;color:#a95a52;border:1px solid #f3d2d0;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .wl-btn-confirm{background:#e0f3e8;color:#1a5e37;border:1px solid #a8d9be;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .wl-btn-abandon{background:#fde8e8;color:#8b1a1a;border:1px solid #f3c4c4;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .wl-link-orders{background:#f6f0ea;border:1px dashed #795238;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#795238;font-weight:700;cursor:pointer;margin-bottom:12px;}
    .wl-collapse-head{padding:10px 14px;background:#f5f3ef;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:#666;margin-bottom:12px;}
    .wl-empty{background:white;border:2px dashed #e0d8d0;padding:40px 20px;border-radius:12px;text-align:center;color:#888;font-size:14px;font-weight:600;}
    /* 放棄/取消 Modal */
    .wl-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:16px;z-index:2000;}
    .wl-modal-card{background:white;border-radius:16px;max-width:400px;width:100%;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-height:90vh;display:flex;flex-direction:column;}
    .wl-modal-head{padding:16px;text-align:center;font-size:16px;font-weight:900;flex-shrink:0;}
    .wl-modal-head.danger{background:#dc3545;color:white;}
    .wl-modal-head.warning{background:#ffa07a;color:white;}
    .wl-modal-body{padding:18px;font-size:13.5px;line-height:1.7;color:#333;overflow-y:auto;flex:1;}
    .wl-modal-actions{display:flex;gap:8px;padding:0 18px 18px;flex-shrink:0;}
    .wl-modal-btn{flex:1;padding:12px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:14px;}
    .wl-modal-btn-secondary{background:#e0d8d0;color:#333;}
    .wl-modal-btn-danger{background:#dc3545;color:white;}
    .wl-modal-btn-danger:disabled{background:#f8b4ba;cursor:not-allowed;}
    .wl-affected-list{background:#fff3cd;border-left:3px solid #ffa500;padding:10px 12px;margin:12px 0;border-radius:4px;font-size:12.5px;}
    .wl-affected-list ul{list-style:disc;padding-left:20px;margin-top:4px;}
    .wl-rule-check{display:flex;align-items:flex-start;gap:8px;background:#f6f6f6;padding:10px 12px;border-radius:8px;margin:12px 0;}
    .wl-rule-check input{margin-top:3px;transform:scale(1.2);}
    .wl-rule-check label{font-size:12.5px;line-height:1.5;color:#555;cursor:pointer;}

    /* 新增品項 Modal */
    .additem-search{border:1.5px solid #e0d8d0;border-radius:10px;padding:10px 14px;font-size:14px;width:100%;background:#fbfaf9;}
    .additem-row{padding:12px 14px;border-bottom:.5px solid #e0d8d0;display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .additem-row.sel{background:#eaf3de;}
    .additem-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;font-size:13px;}
    .additem-price{font-size:12px;color:#888;}
  </style>
</head>
<body>
  <div id="maintenanceArea" style="display:none;text-align:center;padding:80px 20px;background:var(--brand-bg);height:100vh;">
    <div style="margin-bottom:25px;"><img src="https://drive.google.com/thumbnail?id=1K8G2I1a-8umj8thU1LXOhbO6HVYpYwk6&sz=w800" style="max-width:160px;height:auto;" alt="Logo"></div>
    <h3 class="fw-bold mb-4" style="color:var(--brand-brown);letter-spacing:2px;">系統升級維護中</h3>
    <div class="card-custom mx-auto" style="max-width:400px;"><p id="maintenanceMsg" class="fw-bold mb-0" style="color:var(--brand-brown);line-height:1.8;font-size:16px;"></p></div>
  </div>
  <div id="loadingArea"><div class="header-img header-img-mini"><h4 class="fw-bold m-0" style="letter-spacing:1px;">Wander Ease</h4></div><div class="loader-overlay mt-5"><div class="spinner-border mb-3" role="status"></div><p class="small text-muted fw-bold">🔒 安全驗證中，為您打造專屬空間...</p></div></div>

  <div class="modal fade" id="friendshipModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"><div class="modal-dialog modal-dialog-centered px-3"><div class="modal-content shadow-lg border-0" style="border-radius:20px;background:#fbfaf9;"><div class="modal-body p-4 text-center">
    <div class="mb-3"><i class="bi bi-bell-fill" style="font-size:3rem;color:var(--brand-brown);"></i></div>
    <h4 class="fw-bold mb-3" style="color:var(--brand-charcoal);letter-spacing:1px;">專屬通知小提醒</h4>

    async function executeBind(){const ph=document.getElementById('bindPhone').value.trim(),em=document.getElementById('bindEmail').value.trim(),nm=document.getElementById('bindName').value.trim();if(!ph||!em||!nm)return alert("所有欄位皆為必填！");const btn=document.getElementById('btnBind');btn.innerText="資料寫入中...";btn.disabled=true;try{const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({action:'bindUser',lineUid:currentLineUid,phone:ph,email:em,name:nm})});const d=await r.json();if(d.status==="SUCCESS"){document.getElementById('bindArea').style.display='none';document.getElementById('loadingArea').style.display='block';let lt=document.querySelector('#loadingArea p');if(lt)lt.innerText="✅ 綁定成功！";setTimeout(checkMemberStatus,1500);}else{alert("錯誤: "+d.message);btn.innerText="確認綁定";btn.disabled=false;}}catch(e){alert("網路錯誤");btn.innerText="確認綁定";btn.disabled=false;}}
    
    // ===== 管理員清除 Cache =====
    async function executeAdminClearCache() {
      if (!confirm("確定清除所有前台 Cache？\n（所有客人下次查詢會讀取最新資料）")) {
        return;
      }
      const btn = event.target.closest('button');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<span>⏳</span><span>清除中...</span>';
      btn.disabled = true;
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            action: 'adminClearCache',
            lineUid: currentLineUid
          })
        });
        const d = await r.json();
        if (d.status === "SUCCESS") {
          alert("✅ 前台 Cache 已清空\n頁面即將重新載入");
          window.location.reload();
        } else {
          alert("清除失敗：" + d.message);
          btn.innerHTML = originalHTML;
          btn.disabled = false;
        }
      } catch (e) {
        alert("網路錯誤：" + e.message);
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    }
    // ===== 管理員搜尋 =====

    // ===== 正式訂單渲染 =====
    function renderOrders(orders,promos,gp){
      const oc=document.getElementById('regularOrdersContainer');

    // 🌟 樂觀更新 (Optimistic UI)：客人按下送出後瞬間切換畫面，系統在背景默默處理
    function submitEdits(mid){
        let ed=pendingEdits[mid];
        if(!ed||!ed.length)return;
        if(!confirm('確定送出所有修改？'))return;
        
        // 1. 瞬間套用修改結果到畫面資料上 (樂觀更新)
        let po = poData.preorders.find(p => p.masterId === mid);
        if(po) {
            ed.forEach(e => {
                if(e.type === 'MODIFY') {
                    let it = po.items.find(i => i.recordId === e.recordId);
                    if(it) it.reqQty = e.newQty;
                } else if(e.type === 'DELETE') {
                    let it = po.items.find(i => i.recordId === e.recordId);
                    if(it) it.isCancelled = true;
                } else if(e.type === 'ADD') {
                    po.items.push({
                        recordId: 'temp_' + Math.random().toString(36).substr(2, 9), // 暫時的假ID
                        inventoryId: e.inventoryId,
                        product: e.product,
                        price: e.price,
                        reqQty: e.qty,
                        allocQty: 0
                    });
                }
            });
        }

        // 2. 發送給背景處理 (不卡畫面)
        let payloadStr = JSON.stringify({lineUid:currentLineUid,masterId:mid,changes:ed});
        fetch(GAS_URL,{
            method:"POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body:new URLSearchParams({action:'customerEditPreorder',payload:payloadStr})

        // 3. 瞬間提示成功，清除預覽並重新渲染卡片

        delete pendingEdits[mid];

    // 🎨 品牌 hash 自動配色（前後端同一演算法）
    function wlGetBrandColor(brand) {
      const palette = [
        { bg:'#fce8e8', text:'#8b1a1a' },
        { bg:'#fff4e0', text:'#8a5a00' },
        { bg:'#fffacc', text:'#685800' },
        { bg:'#e4f5e4', text:'#1f5c1f' },
        { bg:'#d9f1f1', text:'#0f5a5a' },
        { bg:'#dfeafc', text:'#1a3d78' },
        { bg:'#ece0f7', text:'#3e1d6e' },
        { bg:'#fce0ec', text:'#702346' },
        { bg:'#eae3d5', text:'#5a4423' },
        { bg:'#e6e6e6', text:'#333333' }
      ];
      let hash = 0;
      const s = String(brand||'');
      for (let i = 0; i < s.length; i++) {
        hash = ((hash << 5) - hash) + s.charCodeAt(i);
        hash = hash & hash;
      }
      return palette[Math.abs(hash) % palette.length];
    }

    // 短版日期 MM/DD
    function wlFmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return (d.getMonth()+1) + '/' + d.getDate();
    }

    // 長版時間 MM/DD HH:MM:SS
    function wlFmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const m = d.getMonth()+1;
      const day = d.getDate();
      const H = String(d.getHours()).padStart(2,'0');
      const M = String(d.getMinutes()).padStart(2,'0');
      const S = String(d.getSeconds()).padStart(2,'0');
      return `${m}/${day} ${H}:${M}:${S}`;
    }

    // 清場日（短版含日時分）
    function wlFmtDeadline(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // 從備註解析取消時間（含換貨情境）
    function wlParseCancelTime(note) {
      if (!note) return '';
      const lines = note.split('\n');
      for (let i = lines.length - 1; i >= 0; i--) {
        const line = lines[i];
        if (/ACT_CUST_CANCEL|ACT_CUST_ABANDON|ACT_SWAP_OUT/.test(line)) {
          const m = line.match(/^\[([^\|]+?)\s*\|/);
          if (m) return m[1].trim();
        }
      }
      return '';
    }

    // 規則文字轉 <li>
    function wlFormatRules(rules) {
      if (!rules) {
        return `
          <li>候補 = <strong>委託我們為您代購</strong>。商品一旦順利買到，會直接為您保留，所以請您確實是想要這份商品再排隊唷</li>
          <li>商品價格會依<strong>配到貨當下的匯率與運費</strong>計算，無法預先告知，如果對價格有疑慮，建議您先不要排隊</li>
          <li>想法改變了也沒關係，隨時可以在這個頁面點「取消排隊」，<strong>越早取消越好</strong></li>
          <li>當我們通知您配到貨了，若選擇「放棄」，為避免您繼續佔著其他排隊位置，<strong>系統會一併取消您其他的候補</strong>，請您謹慎考慮後再做決定</li>`;
      }
      return rules.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean)
        .map(p => `<li>${escHTML(p).replace(/\n/g, '<br>')}</li>`).join('');
    }

    // 依品牌系列分組
    function wlGroupByBrandSeries(items) {
      const map = {};
      items.forEach(i => {
        const key = `${i.brand}||${i.series}`;
        if (!map[key]) map[key] = { brand: i.brand, series: i.series, items: [] };
        map[key].items.push(i);
      });
      return Object.values(map);
    }

        const groups = wlGroupByBrandSeries(data.queueItems);
        groups.forEach(g => {
          const c = wlGetBrandColor(g.brand);
          let itemsHtml = g.items.map(i => {
            // 🔄 換貨來的品項：顯示徽章與來源
            const swapBadge = i.swapFromProduct
              ? `<span style="display:inline-block;background:#EEEDFE;color:#3C3489;font-size:10.5px;padding:1px 7px;border-radius:4px;margin-left:6px;font-weight:600;">🔄 換貨</span>`
              : '';
            const swapMeta = i.swapFromProduct
              ? `<span style="color:#3C3489;">由 ${escHTML(i.swapFromProduct)} 換貨</span>`
              : `<span>填單於 ${wlFmtTime(i.queueTime)}</span>`;
            return `
            <div class="wl-v2-item">
              <div class="wl-v2-info">
                <div class="wl-v2-name">${escHTML(i.product)} x${i.reqQty}${swapBadge}</div>
                <div class="wl-v2-meta">${swapMeta}</div>
              </div>
              <div class="wl-v2-actions">
                <button class="wl-btn-cancel" onclick="wlCancelItem('${i.recordId}','${escAttr(i.product)}',${i.reqQty})">取消排隊</button>
              </div>
            </div>`;
          }).join('');
          html += `
            <div class="wl-v2-card">
              <div class="wl-v2-cardhead" style="background:${c.bg};">
                <span class="wl-v2-brand" style="background:${c.text};">${escHTML(g.brand)}</span>
                <span class="wl-v2-series">${escHTML(g.series)}</span>
              </div>
              <div class="wl-v2-body">${itemsHtml}</div>
            </div>`;
        });
      }

      // ✅ 已轉訂單（只提示）
      if (hasTransferred) {
        html += `
          <div class="wl-section-head">
            <span>✅ 已轉正式訂單</span>
            <span class="wl-count">${data.transferredCount} 件</span>
          </div>
          <div class="wl-link-orders" onclick="switchToOrdersTab()">
            🔄 請到「訂單」頁查看這些已轉正式訂單的後續
          </div>`;
      }

      // ❌ 歷史取消（折疊）
      if (hasCancelled) {
        html += `
          <div class="wl-collapse-head" onclick="wlToggleCancelled()">
            <span>❌ 歷史取消紀錄</span>
            <span id="wlCancelledToggle">${data.cancelledItems.length} 件 ▾</span>
          </div>
          <div id="wlCancelledList" style="display:none;">`;
        const groups = wlGroupByBrandSeries(data.cancelledItems);
        groups.forEach(g => {
          const c = wlGetBrandColor(g.brand);
          let itemsHtml = g.items.map(i => {
            const cancelTime = wlParseCancelTime(i.note) || wlFmtDate(i.queueTime);
            // 🔄 若是換貨取消的：顯示「已換成 X」而非單純「取消」
            const isSwap = !!i.swapToProduct;
            const metaHtml = isSwap
              ? `<span style="color:#3C3489;">📦 已換成 ${escHTML(i.swapToProduct)}</span><span style="margin-left:8px;color:#888;">${escHTML(cancelTime)}</span>`
              : `<span>${escHTML(cancelTime)} 取消</span>`;
            return `
            <div class="wl-v2-item" style="opacity:0.6;">
              <div class="wl-v2-info">
                <div class="wl-v2-name">${escHTML(i.product)}</div>
                <div class="wl-v2-meta">${metaHtml}</div>
              </div>
            </div>`;
          }).join('');
          html += `
            <div class="wl-v2-card" style="opacity:0.85;">
              <div class="wl-v2-cardhead" style="background:${c.bg};">
                <span class="wl-v2-brand" style="background:${c.text};">${escHTML(g.brand)}</span>
                <span class="wl-v2-series">${escHTML(g.series)}</span>
              </div>
              <div class="wl-v2-body">${itemsHtml}</div>
            </div>`;
        });
        html += `</div>`;
      }

      // 空狀態
      if (!hasWaiting && !hasConfirmed && !hasQueue && !hasTransferred && !hasCancelled) {
        html += `<div class="wl-empty">🎈 您目前沒有候補中的商品</div>`;
      }

      c.innerHTML = html;
    }

    function wlToggleCancelled() {
      const el = document.getElementById('wlCancelledList');
      const toggle = document.getElementById('wlCancelledToggle');
      if (el.style.display === 'none') {
        el.style.display = 'block';
        toggle.innerHTML = toggle.innerHTML.replace('▾', '▴');
      } else {
        el.style.display = 'none';
        toggle.innerHTML = toggle.innerHTML.replace('▴', '▾');
      }
    }

    function switchToOrdersTab() {
      const ordersTab = document.querySelector('.bottom-nav-item[onclick*="pageOrders"]');
      if (ordersTab) ordersTab.click();
    }

    // ===== 取消排隊 Modal =====
    function wlCancelItem(recordId, productName, qty) {
      const modalHtml = `
        <div class="wl-modal-bg" id="wlCancelModal">
          <div class="wl-modal-card">
            <div class="wl-modal-head warning">🗑 確認取消排隊</div>
            <div class="wl-modal-body">
              您將取消以下候補排隊：
              <div style="background:#fff8e1;border-radius:8px;padding:10px 12px;margin:10px 0;font-weight:700;">
                ${escHTML(productName)} × ${qty}
              </div>
              <div style="font-size:12px;color:#888;">
                ＊ 取消後無法復原，若還想購買須重新填單<br>
                ＊ 此動作僅取消此品項，其他候補不受影響
              </div>
              <div class="wl-rule-check">
                <input type="checkbox" id="wlChkCancel" onchange="document.getElementById('wlBtnCancelOk').disabled = !this.checked;">
                <label for="wlChkCancel">我已閱讀並了解候補規則，確認要取消此品項的排隊</label>
              </div>
            </div>
            <div class="wl-modal-actions">
              <button class="wl-modal-btn wl-modal-btn-secondary" onclick="wlCloseModal()">返回</button>
              <button class="wl-modal-btn wl-modal-btn-danger" id="wlBtnCancelOk" disabled onclick="wlExecCancel('${recordId}')">確定取消</button>
            </div>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    async function wlExecCancel(recordId) {
      const btn = document.getElementById('wlBtnCancelOk');
      btn.disabled = true; btn.innerHTML = '處理中...';
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: {"Content-Type":"application/x-www-form-urlencoded"},
          body: new URLSearchParams({action:'customerCancelWaitlist', lineUid: currentLineUid, waitlistItemId: recordId})
        });
        const d = await r.json();
        wlCloseModal();
        if (d.status === "SUCCESS") { alert("✅ 已取消排隊"); loadWaitlistData(); }
        else alert("失敗：" + d.message);
      } catch(e){ wlCloseModal(); alert("網路錯誤"); }
    }

    // ===== 確認保留 =====
    async function wlConfirmItem(recordId, productName, qty) {
      if (!confirm(`確認保留此商品？\n\n${productName} × ${qty}\n\n確認後會由小幫手為您建立正式訂單並通知匯款。`)) return;
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: {"Content-Type":"application/x-www-form-urlencoded"},
          body: new URLSearchParams({action:'customerConfirmWaitlist', lineUid: currentLineUid, recordIds: JSON.stringify([recordId])})
        });
        const d = await r.json();
        if (d.status === "SUCCESS") { alert("✅ 已確認保留"); loadWaitlistData(); }
        else alert("失敗：" + d.message);
      } catch(e){ alert("網路錯誤"); }
    }

    // ===== 放棄配貨（含連坐警告 Modal）=====
    async function wlAbandonItem(recordId, productName, qty) {
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: {"Content-Type":"application/x-www-form-urlencoded"},
          body: new URLSearchParams({action:'previewAbandonCascade', lineUid: currentLineUid, waitlistItemId: recordId})
        });
        const d = await r.json();
        if (d.status !== "SUCCESS") return alert("讀取失敗：" + d.message);

        const cascaded = d.cascaded || [];
        let cascadeHtml = '';
        if (cascaded.length > 0) {
          cascadeHtml = `
            <div class="wl-affected-list">
              <strong style="color:#856404;">🗑 將一併取消的其他候補（${cascaded.length} 件）：</strong>
              <ul>${cascaded.map(i => `<li>【${escHTML(i.brand)}】${escHTML(i.product)}${i.status.indexOf('已配貨') > -1 ? '（配到貨）' : '（排隊中）'}</li>`).join('')}</ul>
            </div>`;
        }

        const modalHtml = `
          <div class="wl-modal-bg" id="wlAbandonModal">
            <div class="wl-modal-card">
              <div class="wl-modal-head danger">⚠️ 重要警告：放棄配貨</div>
              <div class="wl-modal-body">
                您即將放棄以下已為您配到的商品：
                <div style="background:#fff8e1;border-radius:8px;padding:10px 12px;margin:10px 0;font-weight:700;">
                  ${escHTML(productName)} × ${qty}
                </div>
                <div style="background:#ffe8e8;border-left:4px solid #dc3545;padding:12px;border-radius:4px;margin:14px 0;">
                  <div style="color:#dc3545;font-weight:900;margin-bottom:6px;">⚠️ 此動作將同時取消您其他所有候補</div>
                  <div style="font-size:12.5px;color:#5a1e1e;line-height:1.5;">
                    為避免您繼續佔用排隊位置，系統會自動取消以下候補：
                  </div>
                </div>
                ${cascadeHtml}
                <div style="font-size:12px;color:#666;line-height:1.5;">
                  如您只是暫時不需要這件商品，但仍希望保留其他候補，請點「返回」選「✓ 確認保留」。
                </div>
                <div class="wl-rule-check">
                  <input type="checkbox" id="wlChkAbandon" onchange="document.getElementById('wlBtnAbandonOk').disabled = !this.checked;">
                  <label for="wlChkAbandon">我已了解：放棄配貨會同時取消我其他所有候補，此決定不可復原</label>
                </div>
              </div>
              <div class="wl-modal-actions">
                <button class="wl-modal-btn wl-modal-btn-secondary" onclick="wlCloseModal()">返回</button>
                <button class="wl-modal-btn wl-modal-btn-danger" id="wlBtnAbandonOk" disabled onclick="wlExecAbandon('${recordId}')">確定放棄並取消全部候補</button>
              </div>
            </div>
          </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
      } catch(e) { alert("網路錯誤"); }
    }

    async function wlExecAbandon(recordId) {
      const btn = document.getElementById('wlBtnAbandonOk');
      btn.disabled = true; btn.innerHTML = '處理中...';
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: {"Content-Type":"application/x-www-form-urlencoded"},
          body: new URLSearchParams({action:'customerAbandonWaitlist', lineUid: currentLineUid, waitlistItemId: recordId})
        });
        const d = await r.json();
        wlCloseModal();
        if (d.status === "SUCCESS") { alert("✅ " + d.message); loadWaitlistData(); }
        else alert("失敗：" + d.message);
      } catch(e){ wlCloseModal(); alert("網路錯誤"); }
    }

    function wlCloseModal() {
      const modal = document.querySelector('.wl-modal-bg');
      if (modal) modal.remove();
    }
  </script>
</body>
</html>
